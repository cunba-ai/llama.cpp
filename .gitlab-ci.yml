stages:
  - prepare
  - build

variables:
  CUDA_ARCHS: "60;61;70;75;80;86;89;90"
  AMDGPU_ARCHS: "gfx1100;gfx1101;gfx1102;gfx1150;gfx1151;gfx1200;gfx1201"
  OSS_ENDPOINT: "oss-cn-shanghai.aliyuncs.com"
  OSS_PATH: "cunba.ai/llama.cpp"
  GIT_DEPTH: 20
  GIT_STRATEGY: fetch
  BUCKET_NAME: "miaosoft-internal"

# ──────────────────────────────────────────────
# Docker 镜像重建（仅 Dockerfile.build 变更时触发）
# ──────────────────────────────────────────────
rebuild:docker-image:
  stage: prepare
  tags:
    - 4090ubuntudocker
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: unix:///var/run/docker.sock
  script:
    - docker build -t llama-cpp-builder:cu12_rocm72_vk -f miaosoft/Dockerfile.build .
    - echo "Docker image rebuilt successfully"
  rules:
    - if: $CI_COMMIT_BRANCH == "master" && $CI_PIPELINE_SOURCE == "push"
      changes:
        - miaosoft/Dockerfile.build
      when: on_success

# ──────────────────────────────────────────────
# Windows Build (PowerShell)
# ──────────────────────────────────────────────
build:windows:
  stage: build
  tags:
    - 4090windows
  cache:
    key: windows-build
    paths:
      - build-win/
      - ossutil64.exe
  script:
    # 调用 bat 编译
    - cmd /c "miaosoft\build-windows-aio-cuda12.8-rocm7.1.bat"
    # 打包 ZIP
    - |
      $commitId = git rev-parse --short HEAD
      $buildDate = Get-Date -Format "yyyyMMdd"
      $buildTag = "llama.cpp-windows-$buildDate-$commitId"
      # 放入安装脚本和 VERSION 文件 (与 bin 同级, 解压后位于 zip 根目录)
      Set-Content -Path ".\build-win\bin\VERSION" -Value "$buildDate-$commitId" -NoNewline -Encoding ASCII
      Copy-Item "miaosoft\scripts\install\install.bat" ".\build-win\bin\install.bat" -Force
      New-Item -ItemType Directory -Force -Path output
      Compress-Archive -Path ".\build-win\bin\*" `
        -DestinationPath "output\$buildTag.zip" `
        -Force
      Write-Host "Created: output\$buildTag.zip"
    # 下载 ossutil64 (Windows 版)
    - |
      if (-not (Test-Path "ossutil64.exe")) {
        Invoke-WebRequest -Uri "https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil-v1.7.18-windows-amd64.zip" -OutFile "ossutil.zip"
        Expand-Archive -Path "ossutil.zip" -DestinationPath "." -Force
        Copy-Item "ossutil-v1.7.18-windows-amd64\ossutil64.exe" "." -Force
      }
    # 上传到 OSS
    - |
      $zipFile = Get-ChildItem "output\*.zip" | Select-Object -First 1
      $ossKey = "$OSS_PATH/$($zipFile.Name)"
      .\ossutil64.exe config -e $OSS_ENDPOINT -i $OSS_ACCESS_KEY_ID -k $OSS_ACCESS_KEY_SECRET -L CH -c .\ossutilconfig
      # Upload versioned copy
      .\ossutil64.exe -c .\ossutilconfig cp "$($zipFile.FullName)" "oss://$BUCKET_NAME/$ossKey" -f
      # Upload latest copy (without date and commit)
      .\ossutil64.exe -c .\ossutilconfig mkdir "oss://$BUCKET_NAME/$OSS_PATH/latest" -h
      .\ossutil64.exe -c .\ossutilconfig cp "$($zipFile.FullName)" "oss://$BUCKET_NAME/$OSS_PATH/latest/llama.cpp-windows.zip" -f
      Write-Host "Uploaded to: oss://$BUCKET_NAME/$ossKey"
      Write-Host "Latest:      oss://$BUCKET_NAME/$OSS_PATH/latest/llama.cpp-windows.zip"
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
      when: always
    - if: $CI_COMMIT_BRANCH =~ /^release\/release-/
      when: on_success
  retry: 1

# ──────────────────────────────────────────────
# Linux Build (Docker executor)
# ──────────────────────────────────────────────
build:linux:
  stage: build
  tags:
    - 4090ubuntudocker
  image: llama-cpp-builder:cu12_rocm72_vk
  cache:
    key: linux-build-v2
    paths:
      - build_linux/
      - ossutil-cache/
  before_script:
    - |
      if [ ! -f ossutil-cache/ossutil64 ]; then
        mkdir -p ossutil-cache
        wget -q https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil-v1.7.18-linux-amd64.zip -O /tmp/ossutil.zip
        unzip -o /tmp/ossutil.zip -d /tmp/
        cp /tmp/ossutil-v1.7.18-linux-amd64/ossutil64 ossutil-cache/ossutil64
        chmod +x ossutil-cache/ossutil64
      fi
  script:
    - export BUILD_DATE=$(date +%Y%m%d)
    - export COMMIT_ID=$(git rev-parse --short HEAD)
    - export BUILD_TAG="llama.cpp-linux-${BUILD_DATE}-${COMMIT_ID}"
    - export OUTPUT_ZIP="${BUILD_TAG}.zip"
    - export OSSUTIL="${CI_PROJECT_DIR}/ossutil-cache/ossutil64"
    # 编译（增量构建）
    - mkdir -p build_linux && cd build_linux
    - |
      cmake .. \
        -DGGML_CUDA=ON \
        -DGGML_VULKAN=ON \
        -DGGML_HIP=ON \
        -DGGML_BACKEND_DL=ON \
        -DBUILD_SHARED_LIBS=ON \
        -DGGML_NATIVE=OFF \
        -DGGML_CCACHE=ON \
        -DCMAKE_BUILD_TYPE=Release \
        -DGGML_CPU_ALL_VARIANTS=OFF \
        -DCMAKE_CUDA_ARCHITECTURES="${CUDA_ARCHS}" \
        -DAMDGPU_TARGETS="${AMDGPU_ARCHS}" \
        -DLLAMA_BUILD_UI=OFF \
        -DLLAMA_USE_PREBUILT_UI=OFF
    - make -j$(nproc) llama-cli llama-server
    # 打包
    - cd "${CI_PROJECT_DIR}" && mkdir -p output
    # 放入安装脚本和 VERSION 文件 (与 build_linux 同级, 解压后位于 zip 根目录)
    - printf '%s' "${BUILD_DATE}-${COMMIT_ID}" > VERSION
    - cp miaosoft/scripts/install/install.sh ./install.sh && chmod +x ./install.sh
    - |
      zip -r "output/${OUTPUT_ZIP}" \
          build_linux/bin/ \
          install.sh \
          VERSION \
          -x '*_test*' -x '*.a'
    - ls -lh "output/${OUTPUT_ZIP}"
    # 上传到 OSS
    - |
      ${OSSUTIL} config -e ${OSS_ENDPOINT} -i ${OSS_ACCESS_KEY_ID} -k ${OSS_ACCESS_KEY_SECRET} -L CH -c /tmp/ossutilconfig
      # Upload versioned copy
      ${OSSUTIL} -c /tmp/ossutilconfig cp "output/${OUTPUT_ZIP}" "oss://${BUCKET_NAME}/${OSS_PATH}/${OUTPUT_ZIP}" -f
      # Upload latest copy (without date and commit)
      ${OSSUTIL} -c /tmp/ossutilconfig mkdir "oss://${BUCKET_NAME}/${OSS_PATH}/latest" -h
      ${OSSUTIL} -c /tmp/ossutilconfig cp "output/${OUTPUT_ZIP}" "oss://${BUCKET_NAME}/${OSS_PATH}/latest/llama.cpp-linux.zip" -f
      echo "Uploaded to: oss://${BUCKET_NAME}/${OSS_PATH}/${OUTPUT_ZIP}"
      echo "Latest:      oss://${BUCKET_NAME}/${OSS_PATH}/latest/llama.cpp-linux.zip"
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
      when: always
    - if: $CI_COMMIT_BRANCH =~ /^release\/release-/
      when: on_success
  retry: 1
