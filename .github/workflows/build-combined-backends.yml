name: Build combined backends

# Builds 6 combined-backend deliverables, each combining ONE GPU vendor backend
# with Vulkan in a single binary (GGML_BACKEND_DL=ON). Replaces the oversized
# GitLab AIO build (CUDA+HIP+Vulkan in one archive) with smaller per-vendor
# archives: cuda+vulkan / hip+vulkan / sycl+vulkan, on Windows and Ubuntu.
#
# CUDA+Vulkan must pass; HIP+Vulkan and SYCL+Vulkan are continue-on-error
# (untested upstream: Vulkan sources compiled under ROCm-clang / icpx).

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths: [
      '.github/workflows/build-combined-backends.yml',
      '**/CMakeLists.txt',
      '**/.cmake',
      '**/*.h',
      '**/*.hpp',
      '**/*.c',
      '**/*.cpp',
      '**/*.cu',
      '**/*.cuh',
      '**/*.comp',
      '**/*.glsl'
    ]

permissions:
  contents: read
  actions: write   # needed by ccache-clear to delete actions caches

env:
  GH_TOKEN: ${{ github.token }}
  CMAKE_ARGS: "-DLLAMA_BUILD_EXAMPLES=OFF -DLLAMA_BUILD_TESTS=OFF -DLLAMA_BUILD_TOOLS=ON -DLLAMA_BUILD_SERVER=ON -DGGML_RPC=ON"
  CUDA_ARCHS: "60;61;70;75;80;86;89;90"
  AMDGPU_TARGETS: "gfx1100;gfx1101;gfx1102;gfx1150;gfx1151;gfx1200;gfx1201"
  VULKAN_VERSION: "1.4.313.2"
  OSS_BUCKET: "miaosoft-internal"
  OSS_ENDPOINT: "oss-cn-shanghai.aliyuncs.com"
  OSS_PREFIX: "cunba.ai/llama.cpp"

concurrency:
  group: build-combined-backends
  cancel-in-progress: false

jobs:
  # ============================================================
  #  CUDA 12.8 + Vulkan
  # ============================================================
  cuda-vulkan-windows:
    runs-on: windows-2022
    steps:
      - name: Clone
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install CUDA Toolkit 12.8
        uses: ./.github/actions/windows-setup-cuda
        with:
          cuda_version: '12.8'

      - name: Install Vulkan SDK
        run: |
          curl.exe -o $env:RUNNER_TEMP/VulkanSDK-Installer.exe -L "https://sdk.lunarg.com/sdk/download/${env:VULKAN_VERSION}/windows/vulkansdk-windows-X64-${env:VULKAN_VERSION}.exe"
          & "$env:RUNNER_TEMP\VulkanSDK-Installer.exe" --accept-licenses --default-answer --confirm-command install
          Add-Content $env:GITHUB_ENV "VULKAN_SDK=C:\VulkanSDK\${env:VULKAN_VERSION}"
          Add-Content $env:GITHUB_PATH "C:\VulkanSDK\${env:VULKAN_VERSION}\bin"

      - name: Install Ninja
        run: choco install ninja

      - name: ccache
        uses: ggml-org/ccache-action@v1.2.21
        with:
          key: combined-windows-2022-cuda-12.8

      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          cmake -S . -B build -G "Ninja Multi-Config" ^
            -DGGML_BACKEND_DL=ON ^
            -DBUILD_SHARED_LIBS=ON ^
            -DGGML_NATIVE=OFF ^
            -DGGML_CUDA=ON ^
            -DGGML_VULKAN=ON ^
            -DGGML_CUDA_CUB_3DOT2=ON ^
            -DCMAKE_CUDA_ARCHITECTURES="${{ env.CUDA_ARCHS }}" ^
            ${{ env.CMAKE_ARGS }}
          set /A NINJA_JOBS=%NUMBER_OF_PROCESSORS%-1
          cmake --build build --config Release -j %NINJA_JOBS% --target llama-cli llama-server

      - name: ccache-clear
        uses: ./.github/actions/ccache-clear
        continue-on-error: true   # cache cleanup must never fail an otherwise-green build
        with:
          key: combined-windows-2022-cuda-12.8

      - name: Bundle CUDA runtime DLLs
        run: |
          $dst='.\build\bin\Release'
          robocopy "${{ env.CUDA_PATH }}\bin" $dst cudart64_*.dll cublas64_*.dll cublasLt64_*.dll nvrtc64_*.dll nvJitLink_*.dll nvtx64_*.dll
          # robocopy returns non-zero on success (codes <8); reset so the step does not fail
          if ($LASTEXITCODE -ge 8) { throw "robocopy failed with code $LASTEXITCODE" } else { $global:LASTEXITCODE = 0 }

      - name: Pack artifacts
        run: |
          $bd = (Get-Date).ToUniversalTime().ToString("yyyyMMdd")
          $ci = (git rev-parse --short HEAD)
          Set-Content -Path .\build\bin\Release\VERSION -Value "$bd-$ci" -NoNewline -Encoding ascii
          Copy-Item miaosoft\scripts\install\install.bat .\build\bin\Release\install.bat -Force
          Copy-Item LICENSE .\build\bin\Release\ -Force
          7z a -snl llama-cuda-vulkan-windows-x64.zip .\build\bin\Release\*

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          path: llama-cuda-vulkan-windows-x64.zip
          name: llama-cuda-vulkan-windows-x64.zip

  cuda-vulkan-ubuntu:
    runs-on: ubuntu-22.04
    container:
      image: nvidia/cuda:12.8.0-devel-ubuntu22.04
    steps:
      - name: Clone
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Dependencies
        run: |
          apt-get update -y
          apt-get install -y build-essential libssl-dev ninja-build git wget gnupg ca-certificates
          # glslc is not in stock Ubuntu 22.04; pull it from the LunarG Vulkan SDK repo
          wget -qO - https://packages.lunarg.com/lunarg-signing-key-pub.asc | apt-key add -
          wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          apt-get update -y
          apt-get install -y vulkan-sdk

      - name: Build
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_RPATH='$ORIGIN' \
            -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON \
            -DGGML_BACKEND_DL=ON \
            -DBUILD_SHARED_LIBS=ON \
            -DGGML_NATIVE=OFF \
            -DGGML_CUDA=ON \
            -DGGML_VULKAN=ON \
            -DGGML_CUDA_CUB_3DOT2=ON \
            -DCMAKE_CUDA_ARCHITECTURES="${{ env.CUDA_ARCHS }}" \
            ${{ env.CMAKE_ARGS }}
          cmake --build build --config Release -j $(nproc) --target llama-cli llama-server

      - name: Bundle CUDA runtime
        run: |
          cp -P /usr/local/cuda/lib64/libcudart.so* build/bin/ 2>/dev/null || true
          cp -P /usr/local/cuda/lib64/libcublas.so* build/bin/ 2>/dev/null || true
          cp -P /usr/local/cuda/lib64/libcublasLt.so* build/bin/ 2>/dev/null || true
          cp -P /usr/local/cuda/lib64/libnvrtc.so* build/bin/ 2>/dev/null || true
          cp -P /usr/local/cuda/lib64/libnvJitLink.so* build/bin/ 2>/dev/null || true

      - name: Pack artifacts
        run: |
          echo "$(date -u +%Y%m%d)-$(git rev-parse --short HEAD)" > build/bin/VERSION
          cp miaosoft/scripts/install/install.sh build/bin/
          cp LICENSE build/bin/
          tar -czvf llama-cuda-vulkan-ubuntu-x64.tar.gz -C build/bin .

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          path: llama-cuda-vulkan-ubuntu-x64.tar.gz
          name: llama-cuda-vulkan-ubuntu-x64.tar.gz

  # ============================================================
  #  ROCm/HIP + Vulkan  (non-blocking)
  # ============================================================
  hip-vulkan-windows:
    continue-on-error: true
    runs-on: windows-2022
    env:
      HIPSDK_INSTALLER_VERSION: "26.Q1"
    steps:
      - name: Clone
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Grab rocWMMA package
        run: |
          curl -o rocwmma.deb "https://repo.radeon.com/rocm/apt/7.2.1/pool/main/r/rocwmma-dev/rocwmma-dev_2.2.0.70201-81~24.04_amd64.deb"
          7z x rocwmma.deb
          7z x data.tar

      - name: Cache ROCm Installation
        id: cache-rocm
        uses: actions/cache@v5
        with:
          path: C:\Program Files\AMD\ROCm
          key: cache-gha-rocm-${{ env.HIPSDK_INSTALLER_VERSION }}-${{ runner.os }}

      - name: Install ROCm
        if: steps.cache-rocm.outputs.cache-hit != 'true'
        run: |
          $ErrorActionPreference = "Stop"
          write-host "Downloading AMD HIP SDK Installer"
          Invoke-WebRequest -Uri "https://download.amd.com/developer/eula/rocm-hub/AMD-Software-PRO-Edition-${{ env.HIPSDK_INSTALLER_VERSION }}-Win11-For-HIP.exe" -OutFile "${env:RUNNER_TEMP}\rocm-install.exe"
          write-host "Installing AMD HIP SDK"
          $proc = Start-Process "${env:RUNNER_TEMP}\rocm-install.exe" -ArgumentList '-install' -NoNewWindow -PassThru
          $completed = $proc.WaitForExit(600000)
          if (-not $completed) {
              Write-Error "ROCm installation timed out after 10 minutes. Killing the process"
              $proc.Kill()
              exit 1
          }
          if ($proc.ExitCode -ne 0) {
              Write-Error "ROCm installation failed with exit code $($proc.ExitCode)"
              exit 1
          }

      - name: Install Vulkan SDK
        run: |
          curl.exe -o $env:RUNNER_TEMP/VulkanSDK-Installer.exe -L "https://sdk.lunarg.com/sdk/download/${env:VULKAN_VERSION}/windows/vulkansdk-windows-X64-${env:VULKAN_VERSION}.exe"
          & "$env:RUNNER_TEMP\VulkanSDK-Installer.exe" --accept-licenses --default-answer --confirm-command install
          Add-Content $env:GITHUB_ENV "VULKAN_SDK=C:\VulkanSDK\${env:VULKAN_VERSION}"
          Add-Content $env:GITHUB_PATH "C:\VulkanSDK\${env:VULKAN_VERSION}\bin"

      - name: Install Ninja
        run: choco install ninja

      - name: ccache
        uses: ggml-org/ccache-action@v1.2.21
        with:
          key: combined-windows-2022-hip

      - name: Build
        run: |
          $env:HIP_PATH=$(Resolve-Path 'C:\Program Files\AMD\ROCm\*\bin\clang.exe' | split-path | split-path)
          $env:CMAKE_PREFIX_PATH="${env:HIP_PATH}"
          cmake -G "Unix Makefiles" -B build -S . `
            -DCMAKE_C_COMPILER="${env:HIP_PATH}\bin\clang.exe" `
            -DCMAKE_CXX_COMPILER="${env:HIP_PATH}\bin\clang++.exe" `
            -DCMAKE_CXX_FLAGS="-I$($PWD.Path.Replace('\', '/'))/opt/rocm-7.2.1/include/ -Wno-ignored-attributes -Wno-nested-anon-types" `
            -DCMAKE_BUILD_TYPE=Release `
            -DGGML_BACKEND_DL=ON `
            -DBUILD_SHARED_LIBS=ON `
            -DGGML_NATIVE=OFF `
            -DGPU_TARGETS="${{ env.AMDGPU_TARGETS }}" `
            -DGGML_HIP_ROCWMMA_FATTN=ON `
            -DGGML_HIP=ON `
            -DGGML_VULKAN=ON `
            ${{ env.CMAKE_ARGS }}
          cmake --build build --config Release -j ${env:NUMBER_OF_PROCESSORS} --target llama-cli llama-server

      - name: ccache-clear
        uses: ./.github/actions/ccache-clear
        continue-on-error: true   # cache cleanup must never fail an otherwise-green build
        with:
          key: combined-windows-2022-hip

      - name: Bundle ROCm runtime DLLs
        run: |
          $env:HIP_PATH=$(Resolve-Path 'C:\Program Files\AMD\ROCm\*\bin\clang.exe' | split-path | split-path)
          $dst='.\build\bin'
          New-Item -ItemType Directory -Force -Path "$dst\rocblas\library","$dst\hipblaslt\library" | Out-Null
          $src="${env:HIP_PATH}\bin"
          foreach ($p in @('amdhip64_*.dll','amd_comgr*.dll','hiprtc*.dll','libhipblas.dll','libhipblaslt.dll','rocblas.dll','rocsolver.dll')) {
            Copy-Item "$src\$p" $dst -Force -ErrorAction SilentlyContinue
          }
          Copy-Item "$src\rocblas\library\*" "$dst\rocblas\library\" -Force -ErrorAction SilentlyContinue
          Copy-Item "$src\hipblaslt\library\*" "$dst\hipblaslt\library\" -Force -ErrorAction SilentlyContinue

      - name: Pack artifacts
        run: |
          $bd = (Get-Date).ToUniversalTime().ToString("yyyyMMdd")
          $ci = (git rev-parse --short HEAD)
          Set-Content -Path .\build\bin\VERSION -Value "$bd-$ci" -NoNewline -Encoding ascii
          Copy-Item miaosoft\scripts\install\install.bat .\build\bin\install.bat -Force
          Copy-Item LICENSE .\build\bin\ -Force
          7z a -snl llama-hip-vulkan-windows-x64.zip .\build\bin\*

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          path: llama-hip-vulkan-windows-x64.zip
          name: llama-hip-vulkan-windows-x64.zip

  hip-vulkan-ubuntu:
    continue-on-error: true
    runs-on: ubuntu-22.04
    steps:
      - name: Clone
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Free up disk space
        uses: ggml-org/free-disk-space@v1.3.1
        with:
          tool-cache: true

      - name: Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential libssl-dev ninja-build wget gnupg ca-certificates
          # glslc is not in stock Ubuntu 22.04; pull it from the LunarG Vulkan SDK repo
          wget -qO - https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo apt-key add -
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-jammy.list https://packages.lunarg.com/vulkan/lunarg-vulkan-jammy.list
          sudo apt-get update -y
          sudo apt-get install -y vulkan-sdk

      - name: Setup ROCm 7.2.1
        run: |
          sudo mkdir --parents --mode=0755 /etc/apt/keyrings
          wget https://repo.radeon.com/rocm/rocm.gpg.key -O - | \
            gpg --dearmor | sudo tee /etc/apt/keyrings/rocm.gpg > /dev/null
          sudo tee /etc/apt/sources.list.d/rocm.list << EOF
          deb [arch=amd64 signed-by=/etc/apt/keyrings/rocm.gpg] https://repo.radeon.com/rocm/apt/7.2.1 jammy main
          EOF
          sudo tee /etc/apt/preferences.d/rocm-pin-600 << EOF
          Package: *
          Pin: release o=repo.radeon.com
          Pin-Priority: 600
          EOF
          sudo apt-get update
          sudo apt-get install -y rocm-hip-sdk

      - name: ccache
        uses: ggml-org/ccache-action@v1.2.21
        with:
          key: combined-ubuntu-22.04-hip

      - name: Build
        run: |
          cmake -B build -S . \
            -DCMAKE_HIP_COMPILER="$(hipconfig -l)/clang" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_RPATH='$ORIGIN' \
            -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON \
            -DGGML_BACKEND_DL=ON \
            -DBUILD_SHARED_LIBS=ON \
            -DGGML_NATIVE=OFF \
            -DGPU_TARGETS="${{ env.AMDGPU_TARGETS }}" \
            -DHIP_PLATFORM=amd \
            -DGGML_HIP_ROCWMMA_FATTN=ON \
            -DGGML_HIP=ON \
            -DGGML_VULKAN=ON \
            ${{ env.CMAKE_ARGS }}
          cmake --build build --config Release -j $(nproc) --target llama-cli llama-server

      - name: ccache-clear
        uses: ./.github/actions/ccache-clear
        continue-on-error: true   # cache cleanup must never fail an otherwise-green build
        with:
          key: combined-ubuntu-22.04-hip

      - name: Bundle ROCm runtime
        run: |
          for lib in libamdhip64 libhipblas libhipblaslt librocblas librocsolver librocblas-util libTensile; do
            cp -P /opt/rocm/lib/${lib}.so* build/bin/ 2>/dev/null || true
          done
          mkdir -p build/bin/rocblas/library
          cp -P /opt/rocm/lib/rocblas/library/* build/bin/rocblas/library/ 2>/dev/null || true

      - name: Pack artifacts
        run: |
          echo "$(date -u +%Y%m%d)-$(git rev-parse --short HEAD)" > build/bin/VERSION
          cp miaosoft/scripts/install/install.sh build/bin/
          cp LICENSE build/bin/
          tar -czvf llama-hip-vulkan-ubuntu-x64.tar.gz -C build/bin .

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          path: llama-hip-vulkan-ubuntu-x64.tar.gz
          name: llama-hip-vulkan-ubuntu-x64.tar.gz

  # ============================================================
  #  SYCL + Vulkan  (non-blocking)
  # ============================================================
  sycl-vulkan-windows:
    continue-on-error: true
    runs-on: windows-2022
    env:
      WINDOWS_BASEKIT_URL: https://registrationcenter-download.intel.com/akdlm/IRC_NAS/b60765d1-2b85-4e85-86b6-cb0e9563a699/intel-deep-learning-essentials-2025.3.3.18_offline.exe
      WINDOWS_DPCPP_MKL: intel.oneapi.win.cpp-dpcpp-common:intel.oneapi.win.mkl.devel:intel.oneapi.win.dnnl:intel.oneapi.win.tbb.devel
      LEVEL_ZERO_SDK_URL: https://github.com/oneapi-src/level-zero/releases/download/v1.28.2/level-zero-win-sdk-1.28.2.zip
      ONEAPI_ROOT: "C:/Program Files (x86)/Intel/oneAPI"
    steps:
      - name: Clone
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download & Install oneAPI
        shell: bash
        run: |
          scripts/install-oneapi.bat $WINDOWS_BASEKIT_URL $WINDOWS_DPCPP_MKL

      - name: Install Level Zero SDK
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "${{ env.LEVEL_ZERO_SDK_URL }}" -OutFile "level-zero-win-sdk.zip"
          Expand-Archive -Path "level-zero-win-sdk.zip" -DestinationPath "C:/level-zero-sdk" -Force
          "LEVEL_ZERO_V1_SDK_PATH=C:/level-zero-sdk" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install Vulkan SDK
        run: |
          curl.exe -o $env:RUNNER_TEMP/VulkanSDK-Installer.exe -L "https://sdk.lunarg.com/sdk/download/${env:VULKAN_VERSION}/windows/vulkansdk-windows-X64-${env:VULKAN_VERSION}.exe"
          & "$env:RUNNER_TEMP\VulkanSDK-Installer.exe" --accept-licenses --default-answer --confirm-command install
          Add-Content $env:GITHUB_ENV "VULKAN_SDK=C:\VulkanSDK\${env:VULKAN_VERSION}"
          Add-Content $env:GITHUB_PATH "C:\VulkanSDK\${env:VULKAN_VERSION}\bin"

      - name: Install Ninja
        run: choco install ninja

      - name: ccache
        uses: ggml-org/ccache-action@v1.2.21
        with:
          key: combined-windows-2022-sycl

      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files (x86)\Intel\oneAPI\setvars.bat" intel64 --force
          cmake -G "Ninja" -B build ^
            -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=icx ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DGGML_BACKEND_DL=ON -DBUILD_SHARED_LIBS=ON ^
            -DGGML_NATIVE=OFF ^
            -DGGML_SYCL=ON -DGGML_SYCL_F16=OFF ^
            -DGGML_VULKAN=ON ^
            ${{ env.CMAKE_ARGS }}
          cmake --build build --config Release -j %NUMBER_OF_PROCESSORS% --target llama-cli llama-server

      - name: ccache-clear
        uses: ./.github/actions/ccache-clear
        continue-on-error: true   # cache cleanup must never fail an otherwise-green build
        with:
          key: combined-windows-2022-sycl

      - name: Bundle oneAPI runtime DLLs
        shell: bash
        run: |
          cp "${{ env.ONEAPI_ROOT }}/mkl/latest/bin/mkl_sycl_blas.5.dll" ./build/bin 2>/dev/null || true
          cp "${{ env.ONEAPI_ROOT }}/mkl/latest/bin/mkl_core.2.dll" ./build/bin 2>/dev/null || true
          cp "${{ env.ONEAPI_ROOT }}/mkl/latest/bin/mkl_tbb_thread.2.dll" ./build/bin 2>/dev/null || true
          cp "${{ env.ONEAPI_ROOT }}/compiler/latest/bin/ur_adapter_level_zero.dll" ./build/bin 2>/dev/null || true
          cp "${{ env.ONEAPI_ROOT }}/compiler/latest/bin/ur_adapter_level_zero_v2.dll" ./build/bin 2>/dev/null || true
          cp "${{ env.ONEAPI_ROOT }}/compiler/latest/bin/ur_adapter_opencl.dll" ./build/bin 2>/dev/null || true
          cp "${{ env.ONEAPI_ROOT }}/compiler/latest/bin/ur_loader.dll" ./build/bin 2>/dev/null || true
          cp "${{ env.ONEAPI_ROOT }}/compiler/latest/bin/ur_win_proxy_loader.dll" ./build/bin 2>/dev/null || true
          ZE_LOADER_DLL=$(find "${{ env.ONEAPI_ROOT }}" "$LEVEL_ZERO_V1_SDK_PATH" -iname ze_loader.dll -print -quit 2>/dev/null || true)
          [ -n "$ZE_LOADER_DLL" ] && cp "$ZE_LOADER_DLL" ./build/bin
          cp "${{ env.ONEAPI_ROOT }}/compiler/latest/bin/sycl8.dll" ./build/bin 2>/dev/null || true
          cp "${{ env.ONEAPI_ROOT }}/compiler/latest/bin/svml_dispmd.dll" ./build/bin 2>/dev/null || true
          cp "${{ env.ONEAPI_ROOT }}/compiler/latest/bin/libmmd.dll" ./build/bin 2>/dev/null || true
          cp "${{ env.ONEAPI_ROOT }}/compiler/latest/bin/libiomp5md.dll" ./build/bin 2>/dev/null || true
          cp "${{ env.ONEAPI_ROOT }}/dnnl/latest/bin/dnnl.dll" ./build/bin 2>/dev/null || true
          cp "${{ env.ONEAPI_ROOT }}/tbb/latest/bin/tbb12.dll" ./build/bin 2>/dev/null || true

      - name: Pack artifacts
        shell: bash
        run: |
          bd=$(date -u +%Y%m%d)
          ci=$(git rev-parse --short HEAD)
          printf '%s-%s' "$bd" "$ci" > ./build/bin/VERSION
          cp miaosoft/scripts/install/install.bat ./build/bin/install.bat
          cp LICENSE ./build/bin/
          # build/bin holds the exes + dlls (Ninja single-config puts outputs in build/bin)
          7z a -snl llama-sycl-vulkan-windows-x64.zip ./build/bin/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          path: llama-sycl-vulkan-windows-x64.zip
          name: llama-sycl-vulkan-windows-x64.zip

  sycl-vulkan-ubuntu:
    continue-on-error: true
    runs-on: ubuntu-24.04
    env:
      ONEAPI_ROOT: /opt/intel/oneapi/
      LEVEL_ZERO_VERSION: "1.28.2"
      LEVEL_ZERO_UBUNTU_VERSION: "u24.04"
    steps:
      - name: Clone
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Free up disk space
        uses: ggml-org/free-disk-space@v1.3.1
        with:
          tool-cache: true

      - name: Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential libssl-dev ninja-build libvulkan-dev glslc spirv-headers

      - name: Download & Install oneAPI
        run: |
          cd /tmp
          wget https://registrationcenter-download.intel.com/akdlm/IRC_NAS/56f7923a-adb8-43f3-8b02-2b60fcac8cab/intel-deep-learning-essentials-2025.3.3.16_offline.sh -O intel-deep-learning-essentials_offline.sh
          sudo bash intel-deep-learning-essentials_offline.sh -s -a --silent --eula accept

      - name: Install Level Zero SDK
        run: |
          cd /tmp
          wget -q "https://github.com/oneapi-src/level-zero/releases/download/v${LEVEL_ZERO_VERSION}/level-zero_${LEVEL_ZERO_VERSION}%2B${LEVEL_ZERO_UBUNTU_VERSION}_amd64.deb" -O level-zero.deb
          wget -q "https://github.com/oneapi-src/level-zero/releases/download/v${LEVEL_ZERO_VERSION}/level-zero-devel_${LEVEL_ZERO_VERSION}%2B${LEVEL_ZERO_UBUNTU_VERSION}_amd64.deb" -O level-zero-devel.deb
          sudo apt-get install -y ./level-zero.deb ./level-zero-devel.deb

      - name: ccache
        uses: ggml-org/ccache-action@v1.2.21
        with:
          key: combined-ubuntu-24.04-sycl

      - name: Build
        run: |
          source /opt/intel/oneapi/setvars.sh
          cmake -B build \
            -G "Ninja" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_RPATH='$ORIGIN' \
            -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON \
            -DGGML_SYCL=ON \
            -DGGML_SYCL_F16=OFF \
            -DGGML_VULKAN=ON \
            -DGGML_BACKEND_DL=ON \
            -DBUILD_SHARED_LIBS=ON \
            -DGGML_NATIVE=OFF \
            -DCMAKE_C_COMPILER=icx \
            -DCMAKE_CXX_COMPILER=icpx \
            -DLLAMA_OPENSSL=OFF \
            ${{ env.CMAKE_ARGS }}
          cmake --build build --config Release -j $(nproc) --target llama-cli llama-server

      - name: ccache-clear
        uses: ./.github/actions/ccache-clear
        continue-on-error: true   # cache cleanup must never fail an otherwise-green build
        with:
          key: combined-ubuntu-24.04-sycl

      - name: Bundle oneAPI runtime
        run: |
          cp -P /opt/intel/oneapi/compiler/latest/lib/libsycl.so*       build/bin/ 2>/dev/null || true
          cp -P /opt/intel/oneapi/compiler/latest/lib/libur_loader.so*  build/bin/ 2>/dev/null || true
          cp -P /opt/intel/oneapi/compiler/latest/lib/libur_adapter_level_zero.so* build/bin/ 2>/dev/null || true
          cp -P /opt/intel/oneapi/compiler/latest/lib/libsvml.so*       build/bin/ 2>/dev/null || true
          cp -P /opt/intel/oneapi/compiler/latest/lib/libirng.so*       build/bin/ 2>/dev/null || true
          cp -P /opt/intel/oneapi/compiler/latest/lib/libintlc.so*      build/bin/ 2>/dev/null || true
          cp -P /opt/intel/oneapi/compiler/latest/lib/libimf.so*        build/bin/ 2>/dev/null || true
          cp -P /opt/intel/oneapi/mkl/latest/lib/intel64/libmkl_sycl*.so* build/bin/ 2>/dev/null || true
          cp -P /opt/intel/oneapi/mkl/latest/lib/intel64/libmkl_intel_ilp64.so* build/bin/ 2>/dev/null || true
          cp -P /opt/intel/oneapi/mkl/latest/lib/intel64/libmkl_core.so* build/bin/ 2>/dev/null || true
          cp -P /opt/intel/oneapi/mkl/latest/lib/intel64/libmkl_sequential.so* build/bin/ 2>/dev/null || true
          cp -P /usr/lib/x86_64-linux-gnu/libze_loader.so* build/bin/ 2>/dev/null || true

      - name: Pack artifacts
        run: |
          echo "$(date -u +%Y%m%d)-$(git rev-parse --short HEAD)" > build/bin/VERSION
          cp miaosoft/scripts/install/install.sh build/bin/
          cp LICENSE build/bin/
          tar -czvf llama-sycl-vulkan-ubuntu-x64.tar.gz -C build/bin .

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          path: llama-sycl-vulkan-ubuntu-x64.tar.gz
          name: llama-sycl-vulkan-ubuntu-x64.tar.gz

  # ============================================================
  #  Publish all built archives to Alibaba Cloud OSS
  #  (always runs; HIP/SYCL failures are continue-on-error)
  # ============================================================
  publish-oss:
    runs-on: ubuntu-22.04
    needs:
      - cuda-vulkan-windows
      - cuda-vulkan-ubuntu
      - hip-vulkan-windows
      - hip-vulkan-ubuntu
      - sycl-vulkan-windows
      - sycl-vulkan-ubuntu
    steps:
      - name: Clone
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute version strings
        run: |
          echo "BUILD_DATE=$(date -u +%Y%m%d)" >> $GITHUB_ENV
          echo "COMMIT_ID=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: ./artifact
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la artifact/ || true

      - name: Install ossutil
        run: |
          curl -o ossutil64 "https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil64"
          chmod +x ossutil64
          ./ossutil64 version || true

      - name: Upload to OSS
        env:
          OSS_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_KEY: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          set -e
          cd artifact
          shopt -s nullglob
          files=( *.zip *.tar.gz )
          if [ ${#files[@]} -eq 0 ]; then
            echo "No archives to upload"; exit 0
          fi
          for f in "${files[@]}"; do
            echo "== $f =="
            ./../ossutil64 cp "$f" "oss://${{ env.OSS_BUCKET }}/${{ env.OSS_PREFIX }}/${{ env.BUILD_DATE }}-${{ env.COMMIT_ID }}/$f" \
              -i "$OSS_ID" -k "$OSS_KEY" -e "${{ env.OSS_ENDPOINT }}" -f
            ./../ossutil64 cp "$f" "oss://${{ env.OSS_BUCKET }}/${{ env.OSS_PREFIX }}/latest/$f" \
              -i "$OSS_ID" -k "$OSS_KEY" -e "${{ env.OSS_ENDPOINT }}" -f
          done
